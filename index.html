<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tekmetric API Explorer</title>
<link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

<!-- HAMBURGER (mobile) -->
<button class="hamburger" aria-label="Menu">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div class="sidebar-overlay"></div>

<div class="app-shell">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    <div>Tekmetric<span class="logo-sub">API Explorer</span></div>
  </div>

  <div class="section-label">Global</div>
  <nav>
    <a href="#" data-ep="dashboard" class="active" onclick="EP.nav('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Dashboard</span>
    </a>
  </nav>

  <div class="section-label">Endpoints</div>
  <nav id="endpointNav"></nav>

  <div class="section-label">History</div>
  <nav id="historyNav">
    <span class="sidebar-empty">No requests yet</span>
  </nav>
</aside>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <span class="topbar-label">Shop</span>
  <select id="shopSelect"></select>
  <span class="tag">READ-ONLY</span>
  <span class="spacer"></span>
  <span class="status" id="statusText">Ready</span>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="page-dashboard" class="page active">
  <h2 class="page-title">API Dashboard</h2>
  <div class="stat-row" id="dashStats"></div>
  <div class="two-col">
    <div class="panel"><div class="panel-header"><h3>Recent Repair Orders</h3></div><div class="panel-body" id="dashRO"><div class="loading-row"><div class="spinner"></div></div></div></div>
    <div class="panel"><div class="panel-header"><h3>Upcoming Appointments</h3></div><div class="panel-body" id="dashAppt"><div class="loading-row"><div class="spinner"></div></div></div></div>
  </div>
</div>

<!-- ENDPOINT EXPLORER (dynamic) -->
<div id="page-explorer" class="page">
  <div class="explorer-header">
    <span class="method-badge">GET</span>
    <h2 class="page-title" id="epTitle">Endpoint</h2>
  </div>
  <p class="ep-desc" id="epDesc"></p>

  <!-- Request builder -->
  <div class="panel req-panel">
    <div class="panel-header">
      <h3>Request Builder</h3>
      <button class="btn btn-primary" id="btnSend" onclick="EP.send()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Send Request
      </button>
    </div>
    <div class="panel-body param-grid" id="paramGrid"></div>
  </div>

  <!-- URL preview -->
  <div class="url-bar">
    <span class="url-method">GET</span>
    <code id="urlPreview">/api/...</code>
    <button class="btn btn-sm btn-outline" onclick="EP.copyUrl()" title="Copy URL">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    </button>
    <button class="btn btn-sm btn-outline" onclick="EP.copyCurl()" title="Copy as cURL">cURL</button>
  </div>

  <!-- Response -->
  <div class="panel resp-panel">
    <div class="panel-header">
      <h3>Response</h3>
      <div class="resp-meta">
        <span class="resp-status" id="respStatus"></span>
        <span class="resp-time" id="respTime"></span>
        <span class="resp-size" id="respSize"></span>
      </div>
      <div class="resp-actions">
        <button class="btn btn-sm btn-outline" onclick="EP.copyJson()">Copy JSON</button>
        <button class="btn btn-sm btn-outline" onclick="EP.exportCsv()">Export CSV</button>
        <button class="btn btn-sm btn-outline" onclick="EP.toggleWrap()" id="btnWrap">Wrap</button>
      </div>
    </div>
    <div class="panel-body resp-body">
      <div class="resp-tabs">
        <button class="resp-tab active" onclick="EP.showTab('pretty')">Pretty</button>
        <button class="resp-tab" onclick="EP.showTab('raw')">Raw</button>
        <button class="resp-tab" onclick="EP.showTab('table')">Table</button>
      </div>
      <pre id="respPretty" class="resp-pre"><span class="resp-placeholder">Click "Send Request" to execute</span></pre>
      <pre id="respRaw" class="resp-pre" style="display:none"></pre>
      <div id="respTable" class="resp-table-wrap" style="display:none"></div>
    </div>
  </div>

  <!-- Pagination -->
  <div class="pagination" id="epPag"></div>
</div>

</div><!-- /content -->
</div><!-- /main -->
</div><!-- /app-shell -->

<div id="toast" class="toast"></div>

<script>
  window.API_BASE = "https://tekmetricapienpoints-production.up.railway.app";
</script>
<script src="js/app.js?v=2"></script>
</body>
</html>
